{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 mt-5">
        <div class="card p-4">
            <h3 class="text-center text-success mb-4">🔐 LOGIN PLAYER</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Masuk</button>
            </form>
            <p class="mt-3 text-center text-muted small">Belum punya akun? <a href="{{ url_for('register') }}" class="text-success">Daftar disini</a></p>
        </div>
    </div>
</div>
{% endblock %}
